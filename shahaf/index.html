    <meta name="twitter:image" content="https://snddigitalagency.com/image/cover-code.png" />
    <style>
        :root {
            --primary: #6366f1;
            --accent: #10b981;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(16, 185, 129, 0.08) 0%, transparent 35%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            /* מוקטן למובייל */
        }

        .card {
            width: 100%;
            max-width: 350px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 35px 22px;
            /*Padding מאוזן יותר */
            text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 18px;
            /* רווח מוקטן */
        }

        .profile-img {
            width: 105px;
            /* מוקטן מעט כדי לחסוך מקום */
            height: 105px;
            border-radius: 35px;
            object-fit: cover;
            border: 2px solid var(--primary);
            padding: 4px;
            background: #111827;
            /* הרקע הכהה שבחרנו */
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .status-dot {
            position: absolute;
            bottom: 6px;
            right: 6px;
            width: 14px;
            height: 14px;
            background: var(--accent);
            border: 3px solid #050a15;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        h1 {
            font-size: 1.55rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .title {
            color: var(--primary);
            font-size: 0.95rem;
            font-weight: 600;
            margin-top: 4px;
        }

        .bio {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin: 12px auto 0;
            line-height: 1.4;
            font-weight: 500;
        }

        .details-container {
            margin-top: 15px;
            cursor: pointer;
        }

        .details-toggle {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            opacity: 0.8;
        }

        .hidden-info {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s ease;
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hidden-info.show {
            max-height: 200px;
            /* הוגדל כדי להכיל את הכפתור */
            opacity: 1;
            margin-top: 15px;
        }

        .info-item {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px;
            border-radius: 12px;
        }

        .vcf-download-btn {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .links-grid {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-radius: 18px;
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            transition: all 0.2s ease;
        }

        .btn i {
            font-size: 1.15rem;
            margin-right: 15px;
            width: 24px;
            color: var(--primary);
            text-align: center;
        }

        .btn-text {
            flex-grow: 1;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border: none;
            font-weight: 700;
            box-shadow: 0 10px 20px -8px rgba(99, 102, 241, 0.4);
        }

        .btn-main i {
            color: #fff;
            transform: scale(1.1);
        }

        .btn:active {
            transform: scale(0.98);
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 9999;
            /* התיקון הקריטי: מבטיח שזה יופיע מעל ה-Glassmorphism */
        }
        #toggle-icon {
            transition: transform 0.3s ease;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="profile-wrapper">
            <img src="/image/profile-dark.png" alt="Shahaf Friedlander" class="profile-img">
            <div class="status-dot"></div>
        </div>

        <h1>Shahaf Friedlander</h1>
        <div class="title">Backend Architect & Consultant</div>

        <div class="bio">
            Scalable Backend Systems • Design & Delivery • Production-Ready Code
        </div>

        <div class="details-container">
            <div class="details-toggle" onclick="toggleDetails()">
                <span id="toggle-text">Show contact info</span>
                <i class="fas fa-chevron-down" id="toggle-icon"></i>
            </div>

            <div id="contact-info" class="hidden-info">
                <div class="info-item" onclick="copyToClipboard('0506986298', 'Phone copied!')">
                    <i class="fas fa-phone"></i>
                    <span>050-698-6298</span>
                    <i class="far fa-copy" style="margin-left: auto; font-size: 0.7rem; opacity: 0.5;"></i>
                </div>
                <div class="info-item" onclick="copyToClipboard('shahaf579@gmail.com', 'Email copied!')">
                    <i class="far fa-envelope"></i>
                    <span>shahaf579@gmail.com</span>
                    <i class="far fa-copy" style="margin-left: auto; font-size: 0.7rem; opacity: 0.5;"></i>
                </div>
                <a href="contact.vcf" class="vcf-download-btn">
                    <i class="fas fa-id-card"></i> Save Full Contact Card
                </a>
            </div>
        </div>

        <div class="links-grid">
            <a href="https://wa.me/972506986298" class="btn">
                <i class="fab fa-whatsapp"></i>
                <span class="btn-text">WhatsApp Me</span>
            </a>

            <a href="https://www.linkedin.com/in/shahaf-friedlander-65564a121/" target="_blank" class="btn">
                <i class="fab fa-linkedin-in"></i>
                <span class="btn-text">LinkedIn Profile</span>
            </a>

            <a href="mailto:shahaf579@gmail.com" class="btn">
                <i class="far fa-envelope"></i>
                <span class="btn-text">Email Me</span>
            </a>
            <a href="tel:0506986298" class="btn btn-main">
                <i class="fas fa-user-plus"></i>
                <span class="btn-text">Add to Contacts</span>
            </a>
        </div>
    </div>

    <div id="toast">Copied!</div>

    <script>
        function toggleDetails() {
            const info = document.getElementById('contact-info');
            const text = document.getElementById('toggle-text');
            const icon = document.getElementById('toggle-icon');
            info.classList.toggle('show');
            if (info.classList.contains('show')) {
                text.innerText = 'Hide contact info';
                icon.style.transform = 'rotate(180deg)';
            } else {
                text.innerText = 'Show contact info';
                icon.style.transform = 'rotate(0deg)';
            }
        }

        function copyToClipboard(text, message) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }
    </script>
</body>

</html>
