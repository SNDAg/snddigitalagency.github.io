<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shahaf Friedlander | Backend Expert</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --accent: #10b981;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(circle at 15% 15%, rgba(99, 102, 241, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(16, 185, 129, 0.08) 0%, transparent 35%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 360px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 45px 24px;
            text-align: center;
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 24px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 35px;
            object-fit: cover;
            border: 2px solid var(--primary);
            padding: 4px;
            background: rgba(99, 102, 241, 0.05);
        }

        .status-dot {
            position: absolute;
            bottom: 6px;
            right: 6px;
            width: 15px;
            height: 15px;
            background: var(--accent);
            border: 3px solid #050a15;
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent);
        }

        h1 {
            font-size: 1.65rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .title {
            color: var(--primary);
            font-size: 1rem;
            font-weight: 600;
            margin-top: 6px;
        }

        .bio {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin: 20px auto 0;
            line-height: 1.5;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .links-grid {
            margin-top: 35px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            border-radius: 18px;
            text-decoration: none;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            transition: all 0.2s ease;
            opacity: 0;
            animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-15px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .btn:hover,
        .btn:active {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .btn i {
            font-size: 1.25rem;
            margin-right: 15px;
            width: 24px;
            color: var(--primary);
            text-align: center;
        }

        .btn-text {
            flex-grow: 1;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border: none;
            margin-top: 10px;
            font-weight: 700;
            box-shadow: 0 12px 24px -10px rgba(99, 102, 241, 0.5);
        }

        .btn-main i {
            color: #fff;
        }

        .btn:nth-child(1) {
            animation-delay: 0.1s;
        }

        .btn:nth-child(2) {
            animation-delay: 0.2s;
        }

        .btn:nth-child(3) {
            animation-delay: 0.3s;
        }

        .btn:nth-child(4) {
            animation-delay: 0.4s;
        }

        @media (max-width: 360px) {
            .card {
                padding: 35px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }
        }

        /* עיצוב כפתור הגילוי והפרטים המוסתרים */
        .details-container {
            margin-top: 15px;
            cursor: pointer;
            user-select: none;
        }

        .details-toggle {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .details-toggle:hover {
            opacity: 1;
        }

        .hidden-info {
            max-height: 0;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .hidden-info.show {
            max-height: 100px;
            opacity: 1;
            margin-top: 15px;
        }

        .info-item {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .info-item i {
            font-size: 0.8rem;
            width: 15px;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="profile-wrapper">
            <img src="/image/shahaf-code.png" alt="Shahaf Friedlander" class="profile-img">
            <div class="status-dot"></div>
        </div>

        <h1>Shahaf Friedlander</h1>
        <div class="title">Backend Architect & Consultant</div>

        <div class="bio">
            Scalable Backend Systems • Design & Delivery • Production-Ready Code
        </div>
        <div class="details-container" onclick="toggleDetails()">
            <div class="details-toggle">
                <span id="toggle-text">Show contact details</span>
                <i class="fas fa-chevron-down" id="toggle-icon"></i>
            </div>

            <div id="contact-info" class="hidden-info">
                <div class="info-item">
                    <i class="fas fa-phone-alt"></i>
                    <span>050-698-6298</span>
                </div>
                <div class="info-item">
                    <i class="far fa-envelope"></i>
                    <span>shahaf579@gmail.com</span>
                </div>
            </div>
        </div>
        <div class="links-grid">
            <a href="https://wa.me/972506986298" class="btn">
                <i class="fab fa-whatsapp"></i>
                <span class="btn-text">WhatsApp Me</span>
            </a>

            <a href="https://www.linkedin.com/in/shahaf-friedlander-65564a121/" target="_blank" class="btn">
                <i class="fab fa-linkedin-in"></i>
                <span class="btn-text">LinkedIn Profile</span>
            </a>

            <a href="mailto:shahaf579@gmail.com" class="btn">
                <i class="far fa-envelope"></i>
                <span class="btn-text">Email</span>
            </a>

            <a href="contact.vcf" class="btn btn-main">
                <i class="fas fa-user-plus"></i>
                <span class="btn-text">Add to Contacts</span>
            </a>
        </div>
    </div>
    <script>
        function toggleDetails() {
            const info = document.getElementById('contact-info');
            const text = document.getElementById('toggle-text');
            const icon = document.getElementById('toggle-icon');

            info.classList.toggle('show');

            if (info.classList.contains('show')) {
                text.innerText = 'Hide contact details';
                icon.style.transform = 'rotate(180deg)';
            } else {
                text.innerText = 'Show contact details';
                icon.style.transform = 'rotate(0deg)';
            }
        }
    </script>
</body>

</html>
