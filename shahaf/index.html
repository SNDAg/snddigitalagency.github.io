<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahaf Friedlander | Software Architect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1; /* Indigo */
            --accent: #10b981;  /* Emerald */
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 115px;
            height: 115px;
            border-radius: 35px; /* Squircle design */
            object-fit: cover;
            border: 2px solid var(--primary);
            padding: 4px;
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border: 3.5px solid #0a0f1d;
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
        }

        h1 {
            font-size: 1.7rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .title {
            color: var(--primary);
            font-size: 1.05rem;
            font-weight: 600;
            margin-top: 4px;
            letter-spacing: 0.02em;
        }

        .bio {
            font-size: 0.85rem;
            color: #94a3b8;
            margin: 15px auto 0;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .links-grid {
            margin-top: 30px;
            display: grid;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            border-radius: 18px;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .btn i {
            font-size: 1.3rem;
            margin-right: 16px;
            width: 24px;
            color: var(--primary);
            text-align: center;
        }

        .btn-text {
            flex-grow: 1;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), #4f46e5);
            border: none;
            margin-top: 10px;
            font-weight: 700;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.3);
        }
        .btn-main i { color: #fff; }

        /* Animation delays */
        .btn:nth-child(1) { animation-delay: 0.1s; }
        .btn:nth-child(2) { animation-delay: 0.2s; }
        .btn:nth-child(3) { animation-delay: 0.3s; }
        .btn:nth-child(4) { animation-delay: 0.4s; }

    </style>
</head>
<body>

    <div class="card">
        <div class="profile-wrapper">
            <img src="YOUR_IMAGE_LINK" alt="Shahaf Friedlander" class="profile-img">
            <div class="status-dot"></div>
        </div>

        <h1>Shahaf Friedlander</h1>
        <div class="title">Software Architect & Consultant</div>
        
        <p class="bio">
            Cloud Architecture • Tech Strategy • Scalable Systems
        </p>

        <div class="links-grid">
            <a href="https://wa.me/972506986298" class="btn">
                <i class="fab fa-whatsapp"></i>
                <span class="btn-text">WhatsApp Me</span>
            </a>

            <a href="https://www.linkedin.com/in/shahaf-friedlander-65564a121/" target="_blank" class="btn">
                <i class="fab fa-linkedin-in"></i>
                <span class="btn-text">LinkedIn Profile</span>
            </a>

            <a href="mailto:shahaf579@gmail.com" class="btn">
                <i class="far fa-envelope"></i>
                <span class="btn-text">Email</span>
            </a>

            <a href="contact.vcf" class="btn btn-main">
                <i class="fas fa-user-plus"></i>
                <span class="btn-text">Add to Contacts</span>
            </a>
        </div>
    </div>

</body>
</html>
